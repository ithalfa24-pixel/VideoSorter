workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Extract project
        script: unzip VideoSorter.zip
      - name: Build APK
        script: |
          cd VideoSorter
          ./gradlew assembleDebug
    artifacts:
      - VideoSorter/app/build/outputs/apk/debug/app-debug.apk
