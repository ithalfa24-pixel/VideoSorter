workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Extract project
        script: unzip VideoSorter.zip
      - name: Add gradle.properties
        script: |
          echo "android.useAndroidX=true" >> VideoSorter/gradle.properties
          echo "android.enableJetifier=true" >> VideoSorter/gradle.properties
      - name: Build APK
        script: |
          cd VideoSorter
          gradle wrapper --gradle-version 8.2
          ./gradlew assembleDebug
    artifacts:
      - VideoSorter/app/build/outputs/apk/debug/app-debug.apk
